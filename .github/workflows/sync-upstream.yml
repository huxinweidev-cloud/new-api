name: Sync upstream

# Merge QuantumNous/new-api into this fork's main.
# GITHUB_TOKEN cannot push commits that touch .github/workflows/* —
# use repo secret SYNC_UPSTREAM_TOKEN (PAT with contents + workflow).

on:
  schedule:
    - cron: "20 */8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Require SYNC_UPSTREAM_TOKEN
        env:
          SYNC_UPSTREAM_TOKEN: ${{ secrets.SYNC_UPSTREAM_TOKEN }}
        run: |
          if [ -z "${SYNC_UPSTREAM_TOKEN}" ]; then
            echo "::error::Missing repo secret SYNC_UPSTREAM_TOKEN (PAT with contents:write + workflow). Default GITHUB_TOKEN cannot update workflow files from upstream."
            exit 1
          fi

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_UPSTREAM_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream main

      - name: Merge upstream
        run: |
          git checkout main
          git merge upstream/main --no-edit

      - name: Push fork
        run: |
          git push origin main
